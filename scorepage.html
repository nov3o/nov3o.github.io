<!DOCTYPE html>
<html>
<head>
  <title>Tropical MLP-Mixer Classifier</title>
  <style>
    body {
      background-color: #222;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .navbar {
      background-color: #111;
      padding: 10px;
    }
    .navbar a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      margin: 50px auto;
      max-width: 400px;
      padding: 20px;
      background-color: #333;
    }
    .container h1 {
      text-align: center;
    }
    .container form {
      margin-top: 20px;
    }
    .container form label {
      display: block;
      margin-bottom: 10px;
    }
    .container form input[type="file"] {
      margin-bottom: 20px;
    }
    .container form input[type="submit"] {
      background-color: #111;
      color: #fff;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }
    .container form input[type="submit"]:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="/">To Homepage</a>
  </div>
  <div class="container">
    <h1>File Upload Form</h1>	
		<form action="predictions" method="post" enctype="multipart/form-data">  
		  {% csrf_token %}  
      <label for="FilePath">Select a file:</label>
      <input type="file" id="file" name="filePath" accept=".jpg, .jpeg, .png">
      <input type="submit" value="Upload">
    </form>
    <div> <br>  
    	{% if scorePrediction %}  
      <h3>The classification is : {{scorePrediction}}</h3>  
		  {% endif %}  
    </div>  
    <div>  
    	{% if scorePrediction %}  
      <img src="{{ img_uri }}">  
		  {% endif %}  
    </div>  
  </div>
</body>
</html>
